name: Build and Push Docker Image

# 触发条件：当你发布一个新的 Release 时触发
on:
  release:
    types: [published]

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      # 登录到 Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 提取 GitHub Release 的版本号 (比如 v1.0.0)
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/randompicapi # 注意：这里的 mediaflow 换成你想要的镜像名字

      # 设置 QEMU 和 Buildx (支持多架构构建，如 amd64 和 arm64)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 构建并推送镜像
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # 打上两个标签：一个是具体的版本号(v1.0.0)，另一个是 latest
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/randompicapi:${{ github.event.release.tag_name }}
            ${{ secrets.DOCKERHUB_USERNAME }}/randompicapi:latest
          labels: ${{ steps.meta.outputs.labels }}
